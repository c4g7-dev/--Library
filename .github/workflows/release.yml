name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Make gradlew executable
        run: chmod +x gradlew || true

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          TAG=${{ github.ref_name || github.event.inputs.tag }}
          cp app/build/outputs/apk/debug/app-debug.apk library-${TAG}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: Library ${{ github.ref_name || github.event.inputs.tag }}
          body: |
            ## Library ${{ github.ref_name || github.event.inputs.tag }}

            AMOLED dark music player for Android.

            ### Install
            Download `library-*.apk`, enable **Install from unknown sources** in Android settings, then install.

            ### Setup
            1. Prepare a password-protected ZIP of `.opus` files (see README)
            2. Open app -> Settings -> pick ZIP + enter passphrase -> Unlock & Load
            3. Tap any track to play

            > This is a debug build. For signed release APKs, set up signing secrets in CI.
          files: library-${{ github.ref_name || github.event.inputs.tag }}.apk
          draft: false
          prerelease: false
