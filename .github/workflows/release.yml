name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          TAG=${{ github.ref_name || github.event.inputs.tag }}
          cp app/build/outputs/apk/debug/app-debug.apk library-${TAG}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: Library ${{ github.ref_name || github.event.inputs.tag }}
          body: |
            ## Library ${{ github.ref_name || github.event.inputs.tag }}

            AMOLED dark music player for Android. Plays `.opus` files from a password-protected ZIP.

            ### Install
            1. Download `library-*.apk`
            2. On your Android device: **Settings → Apps → Install unknown apps** → allow your browser/Files app
            3. Open the APK and install

            ### First launch
            1. Go to **Settings** tab
            2. Tap the folder icon to pick your `.zip` file
            3. Enter your decrypt passphrase
            4. Tap **Unlock & Load Library**
            5. Tap any track in the grid to play

            > Debug build — unsigned. For a signed release APK see the README.
          files: library-${{ github.ref_name || github.event.inputs.tag }}.apk
          draft: false
          prerelease: false
